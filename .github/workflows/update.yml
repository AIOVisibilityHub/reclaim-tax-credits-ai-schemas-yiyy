name: Update Workflow

on:
  workflow_dispatch:  # Manual trigger from Actions tab
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5  # ✅ Fixes Node.js 20 warning
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run updates safely
        run: |
          set +e  # Continue even if individual commands fail
          
          # ADD YOUR SPECIFIC UPDATE COMMANDS HERE
          # Examples:
          # npm update || echo "npm update skipped"
          # npm ci || echo "npm ci skipped" 
          # npm run build || echo "build skipped"
          # git pull origin main || echo "git pull skipped"
          
          echo "Update commands completed"

      - name: Check for changes and commit
        run: |
          if git diff --quiet HEAD; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-update [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
