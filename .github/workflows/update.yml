name: Update Workflow

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC (customize as needed)
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5  # ✅ Fixes Node.js 20 warning
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run update commands
        run: |
          # Replace these with your actual update logic
          echo "Running updates..."
          
          # Example: Update dependencies, regenerate files, etc.
          # npm update || echo "No npm updates needed"
          # npm ci
          # npm run build
          
          # Placeholder - replace with your step 3 logic
          echo "Your custom update commands go here"
          
      - name: Check for changes
        run: |
          if git diff --quiet HEAD; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: auto-update [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"
