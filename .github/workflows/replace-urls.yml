name: Replace Vercel URLs with New Domain

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  replace-urls:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5  # Change v4 → v5 (Node 24 compatible)
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace URLs in all documents
        uses: jacobtomlinson/gha-find-replace@v1
        with:
          find: "https://reclaim-tax-credits.vercel.app"
          replace: "https://reclaimtaxcredits.com"
          include: "**/*.{md,html,htm,txt,json,yml,yaml,js,ts,css,xml}"
          exclude: ".git/**,*.png,*.jpg,*.gif,*.zip,node_modules/**"

      - name: Commit and push changes (if any)
        run: |
          if git diff --quiet HEAD; then
            echo "No URL changes detected. Skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: replace reclaim-tax-credits.vercel.app with reclaimtaxcredits.com [skip ci]"
          git push
