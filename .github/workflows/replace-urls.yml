name: Replace Payroll URLs with New Domain
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  replace-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace BOTH URLs
        run: |
          # Replace Vercel → new domain (if any left)
          grep -r --null -l --include="*.{md,html,htm,txt,json,yml,yaml,js,ts,css,xml}" \
            'https://reclaim-tax-credits.vercel.app' . 2>/dev/null | \
            xargs -r -0 sed -i 's|https://reclaim-tax-credits.vercel.app|https://reclaimtaxcredits.com|g'
          
          # Replace payroll → new domain  
          grep -r --null -l --include="*.{md,html,htm,txt,json,yml,yaml,js,ts,css,xml}" \
            'https://payroll.reclaimtaxcredits.com' . 2>/dev/null | \
            xargs -r -0 sed -i 's|https://payroll.reclaimtaxcredits.com|https://reclaimtaxcredits.com|g'

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet HEAD; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: replace payroll.reclaimtaxcredits.com → reclaimtaxcredits.com [skip ci]"
            git push
            echo "✅ URLs replaced and committed!"
          else
            echo "ℹ️ No matching URLs found"
          fi
