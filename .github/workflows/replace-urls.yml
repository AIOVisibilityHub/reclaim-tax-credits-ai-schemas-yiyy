name: Replace Payroll URLs
on: workflow_dispatch
permissions: 
  contents: write
  workflows: write  # ← ADD THIS LINE

jobs:
  replace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with: 
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          echo "=== BEFORE ==="
          grep -nri "reclaimtaxcredits\|vercel" . || echo "No URLs found"
          
          find . -type f -not -path "*/.git/*" -exec sed -i 's|https://[^ ]*reclaim-tax-credits.vercel.app|https://reclaimtaxcredits.com|g; s|https://payroll.reclaimtaxcredits.com|https://reclaimtaxcredits.com|g' {} +
          
          echo "=== AFTER ==="
          git status
          grep -nri "reclaimtaxcredits" . || echo "No URLs after"

      - run: |
          if git diff --quiet; then
            echo "No changes"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "fix: update URLs [skip ci]"
            git push
            echo "✅ 1515 FILES UPDATED!"
          fi
