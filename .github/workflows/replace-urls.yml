name: Replace Vercel URLs with New Domain
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  replace-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace URLs (bulletproof)
        run: |
          # Simple: replace in ALL text files, sed will skip binaries safely
          grep -r --null -l --include="*.{md,html,htm,txt,json,yml,yaml,js,ts,css,xml}" \
            'https://reclaim-tax-credits.vercel.app' . \
            | xargs -0 -r -I {} sed -i 's|https://reclaim-tax-credits.vercel.app|https://reclaimtaxcredits.com|g' {}

      - name: Commit changes (if any)
        run: |
          if ! git diff --quiet HEAD; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: replace reclaim-tax-credits.vercel.app with reclaimtaxcredits.com [skip ci]"
            git push
          else
            echo "No changes found"
          fi
