name: Replace Vercel URLs with New Domain
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:  # ← ADD THIS
  contents: write  # ← GIVES BOT PUSH PERMISSION

jobs:
  replace-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace URLs with sed
        run: |
          find . -type f \
            \( -name "*.md" -o -name "*.html" -o -name "*.htm" -o -name "*.txt" \
               -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" \
               -o -name "*.js" -o -name "*.ts" -o -name "*.css" -o -name "*.xml" \) \
            -not -path "./.git/*" \
            -not -path "*/node_modules/*" \
            -exec sed -i 's|https://reclaim-tax-credits.vercel.app|https://reclaimtaxcredits.com|g' {} +

      - name: Commit and push changes (if any)
        run: |
          if git diff --quiet HEAD; then
            echo "No URL changes detected. Skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: replace reclaim-tax-credits.vercel.app with reclaimtaxcredits.com [skip ci]"
          git push
